name: Run Data Pipeline

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Scheduled run (e.g., every Sunday at midnight UTC)
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Run Data Ingestion and Master Panel Build
      run: |
        python main.py

    - name: Commit and push generated data
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add -f data/processed/master_panel.parquet
        git add -f data/raw/prices/monthly_prices.csv
        git add -f data/raw/fundamentals/quarterly_fundamentals.csv
        git commit -m "chore: auto-generate financial panel data [skip ci]" || echo "No changes to commit"
        git push
