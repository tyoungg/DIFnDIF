name: Run Data Pipeline

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Scheduled run (e.g., every Sunday at midnight UTC)
  schedule:
    - cron: '0 0 * * 0'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .

    - name: Run Data Ingestion and Master Panel Build
      run: |
        python main.py

    - name: Upload Master Panel Artifact
      uses: actions/upload-artifact@v4
      with:
        name: master-panel-data
        path: data/processed/master_panel.parquet
